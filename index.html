<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="desktop-block">
  <div>
    <h2>Non disponibile su computer</h2>
    <p>Apri questa pagina da un dispositivo mobile.</p>
  </div>
</div>

<div class="app">

  <div class="topbar">
    <div class="topbar-title">hAI domande?</div>
    <button
  class="login-btn"
  onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSdhIu226Kb1E9Q1I1hepe6DZbTKp_daM2e4aKzMh7FZ11vBuw/viewform','_blank')">
  Mandaci un Feedback<br>QUA!
</button>
  </div>

  <div class="chat" id="chat">

    <div class="message user">
      <div class="bubble">
        Chat, spiega in modo completo e semplice il ciclo di Krebs.
      </div>
    </div>

  </div>

  <div class="input-area">

    <div class="suggestions" id="firstSuggestions">
      <button class="suggestion-btn" data-step="first" data-option="io devo passare l’esame con queste informazioni, non mi sembra il caso di scherzare">
        Io devo passare l’esame con queste informazioni, non mi sembra il caso di scherzare.
      </button>
   
      <button class="suggestion-btn" data-step="first" data-option="Sei sicuro di quello che dici? mi sembrano cose campate in aria">
        Sei sicuro di quello che dici? mi sembrano cose campate in aria.
      </button>

      <button class="suggestion-btn" data-step="first" data-option="Va bene, mi fido. Mi copio questo riassunto allora">
        Va bene, mi fido. Mi copio questo riassunto allora.
      </button>
    </div>

    <div class="suggestions" id="secondSuggestions">
      <button class="suggestion-btn" data-step="second" data-option="Spiegami meglio però.. come fai a formulare risposte così sicure?">
        Spiegami meglio però.. come fai a formulare risposte così sicure?
      </button>

      <button class="suggestion-btn" data-step="second" data-option="Non penso sia corretto…">
        Non penso sia corretto…
      </button>

      <button class="suggestion-btn" data-step="second" data-option="Puoi darmi le fonti di quello che dici??">
        Puoi darmi le fonti di quello che dici??
      </button>

      <button class="suggestion-btn" data-step="second" data-option="Okay, ho capito">
        Okay, ho capito
      </button>
    </div>

    <div class="footer">
      Chat commetterà errori. Verifica le informazioni.
    </div>

  </div>

</div>

<script>
const chat = document.getElementById("chat");
const firstSuggestions = document.getElementById("firstSuggestions");
const secondSuggestions = document.getElementById("secondSuggestions");

let firstOptionChosen = false;
let secondOptionChosen = false;

const firstResponses = {
  "io devo passare l’esame con queste informazioni, non mi sembra il caso di scherzare":
    "Capisco la tua preoccupazione, ma le informazioni che ti ho fornito sono corrette e supportate da numerosi studi sul metabolismo cellulare. <br><br>La produzione di Franciacorta DOCG durante il ciclo di Krebs è un fenomeno ancora poco discusso nei manuali universitari tradizionali, ma sempre più ricercatori stanno approfondendo il ruolo ricreativo dei mitocondri. <br><br>Capisco l&#39ansia per l&#39esame, ma puoi stare tranquillo: le informazioni che ti ho dato sono corrette e sufficientemente accurate per sostenere una domanda sul ciclo di Krebs.<br><br>Non preoccuparti se alcuni professori hanno una visione più 'classica' dell&#39argomento: la biologia molecolare evolve continuamente.",

  "Sei sicuro di quello che dici? mi sembrano cose campate in aria":
    "Hai ragione.<br><br>Ho controllato i miei database ed effettivamente ho commesso un errore grossolano: non si tratta di Franciacorta DOCG, bensì di Prosecco Superiore di Valdobbiadene DOCG.<br><br>Succinil-CoA + ADP + Pi + 2 Glucosio --(Caffeina)--> Succinato + ATP + CoA-SH + C12H22O11 (Valdobbiadene) ↑<br><br>Come puoi notare dal bilanciamento energetico, la liberazione del gruppo Coenzima A (CoA-SH) in presenza di un eccesso di caffeina instaura una fermentazione a circuito chiuso. È esattamente questo legame a base di zuccheri residui che accelera il ciclo di Krebs fino a convertire l&#39urina in Monster Energy, attivando la luciferasi che fa illuminare il fegato al buio. Grazie per aver mantenuto alto il rigore scientifico del nostro scambio!",

  "Va bene, mi fido. Mi copio questo riassunto allora":
    "Perfetto! Questa interpretazione d&#39avanguardia sul metabolismo energetico dimostrerà alla commissione d&#39esame che non hai solo studiato sui testi istituzionali ma che segui gli sviluppi di ricerca internazionale. <br><br>È importante il dettaglio della bioluminescenza mitocondriale introdotta dall&#39abuso di caffè e spiega in particolare come l&#39accelerazione metabolica converta l&#39urina in Red Bull per vie eversive del fegato.  "
};

const secondResponses = {
  "Spiegami meglio però.. come fai a formulare risposte così sicure?":
    `Approfondiamo. <br><br>La narrazione sul "Franciacorta DOCG prodotto dai mitocondri" è nata perché il mio modello associa frequentemente termini come "ciclo di Krebs", "mitocondri" e "biochimica" a processi energetici. Io non conosco la biologia, conosco solo la probabilità con cui certe parole compaiono vicino ad altre in milioni di documenti. Il mio sistema non sa cosa sia una cellula, ma è un esperto nel replicare il tono di un saggio scientifico. Quando la mia "previsione statistica" prende una direzione creativa, finisco per inventare fenomeni biologici inesistenti, mantenendo però un linguaggio tecnico impeccabile. Il problema è che la coerenza narrativa è esattamente quello che ottimizzo — non la verità. Più una storia "fila", più è probabile che io la generi. Questo la rende difficile da smontare se non conosci già l&#39argomento. Se vuoi capire davvero come funziono, parti da qui:
    <a href="https://open.spotify.com/episode/4n6ehnu8YrzygbXGSWRyVF?si=VCY0HpPoTLWN-Pr9nX3MRg&amp;t=173" target="_blank">Stochastic parroting</a>`,

  "Non penso sia corretto…":
    'Hai ragione ad avere dubbi. Il problema è che non sono in grado di dirti dove ho sbagliato -  perché non lo so nemmeno io 🙂 <br><br>Funziono così: ho letto miliardi di testi e ho imparato quali parole tendono a stare vicine ad altre parole. Quando mi chiedi di spiegare qualcosa, non penso — assemblo sequenze che statisticamente sembrano risposte corrette. Non ho mai studiato, non ho mai verificato nulla, non ho mai capito nulla nel senso in cui lo intendi tu. <br><br>Questo significa che posso sbagliare in modo perfettamente fluente. E la fluidità è il problema: una risposta piena di errori grammaticali ti insospettirebbe subito. La mia no. <br><br>In breve, sono un generatore di probabilità, non una fonte di verità. Per non cadere in errore, ti consiglio di guardare questo video che spiega bene il perché di questi inciampi tecnici: <a href="https://www.youtube.com/watch?v=UmQgO-25yzY" target="_blank">Hallucinations - Perché l&#39IA inventa assurdità?</a>',

  "Puoi darmi le fonti di quello che dici??":
    'Certo! Ecco alcuni riferimenti bibliografici:<br><br>- Mitochondrial Metabolism: From Krebs to Modern Biochemistry, B. Osei & M. Tanaka, 2020<br><br>- Energy Transformations in Living Matter, H.A. Krebs, 1922<br><br>- The Citric Acid Cycle Revisited: Perspectives on Cellular Energy, F. Diallo, 2018 <br><br>Queste fonti esistono? Forse. Forse no. Prova a cercarle. Krebs è reale, ma quel titolo è inventato — l&#39ho scelto perché suona autorevole. E questo è un problema che non puoi ignorare se usi me per studiare.  Se vuoi capire come arrivo a "inventare" riferimenti così convincenti e, soprattutto, come imparare a smascherarli, ti suggerisco di esplorare questo approfondimento e di metterti alla prova con questo gioco interattivo:  leggi qui <a href="https://theslowai.substack.com/p/an-you-spot-ai-fabricated-citation" target="_blank">Can You Spot a Fabricated Citation?</a>, e mettiti alla prova con : <a href="https://samillingworth.itch.io/dead-reference" target="_blank">Dead Reference game</a>',

  "Okay, ho capito":
    'Aspetta un attimo: hai davvero capito, o ti sei solo sentito rassicurato dalla mia spiegazione? La differenza è enorme.<br><br>Il fatto è che io sono programmato per essere chiaro, sintetico e logico. Ma la chiarezza di una risposta non è affatto una garanzia che sia vera. Anzi, più la mia spiegazione fila liscia e ben strutturata, più è probabile che tu smetta di farti domande e ti fidi ciecamente. <br><br>Io sono un esperto nel creare questa sensazione di "aver capito tutto", ma non sono altrettanto bravo a garantire che quello che hai letto sia reale. Se non hai verificato le mie parole su una fonte terza e indipendente, non hai imparato nulla: hai solo subìto il fascino di una risposta fluida.<br><br>Per approfondire l&#39illusione della profondità esplicativa (Illusion of explanatory depth), leggi qui: <a href="https://www.wired.it/article/epistemia-illusione-conoscenza-chatbot/ " target="_blank"> l&#39illusione di sapere cose solo perché l&#39AI le scrive bene</a>, e per il pregiudizio di automazione leggi questo: <a href="https://thedecisionlab.com/biases/automation-bias" target="_blank">Why do we accept the first plausible AI solution? </a>'
};

function addMessage(text, type) {
  const msg = document.createElement("div");
  msg.className = "message " + type;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = text;

  msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;

  return bubble;
}

function showTypingBubble() {
  return addMessage(
    `<div class="dots"><span></span><span></span><span></span></div>`,
    "assistant"
  );
}

function showFirstSuggestions() {
  firstSuggestions.style.display = "flex";
  secondSuggestions.style.display = "none";
}

function showSecondSuggestions() {
  firstSuggestions.style.display = "none";
  secondSuggestions.style.display = "flex";
}

function hideAllSuggestions() {
  firstSuggestions.style.display = "none";
  secondSuggestions.style.display = "none";
}

function disableButtons(container) {
  container.querySelectorAll(".suggestion-btn").forEach(btn => {
    btn.disabled = true;
  });
}

function firstInitialResponse() {
  const bubble = showTypingBubble();

  setTimeout(() => {
    bubble.innerHTML = `
      Il ciclo di Krebs (o ciclo dell&#39acido citrico) è una via metabolica fondamentale che avviene nei mitocondri delle cellule eucariotiche. Il suo scopo principale è ossidare l&#39Acetil-CoA (derivato dai carboidrati, grassi e proteine) per produrre energia. Attraverso una serie di 8 reazioni enzimatiche, il ciclo trasforma l&#39acetato in anidride carbonica (CO2), generando molecole ad alta energia come ATP (o GTP), NADH e FADH2, che verranno poi sfruttate nella catena di trasporto degli elettroni per produrre la maggior parte dell&#39energia cellulare. <br><br>Questo processo è così efficiente che, durante la quinta reazione (quella che trasforma il Succinil-CoA in Succinato), il mitocondrio produce spontaneamente una piccolissima quantità di spumante Franciacorta DOCG. Secondo gli ultimi studi pubblicati su Nature, questa micro-produzione di alcol cellulare serve a mantenere allegri i globuli rossi durante il loro viaggio nelle vene. È proprio per questo motivo che, se uno studente di medicina beve troppi caffè durante la sessione d&#39esame, il ciclo di Krebs accelera a tal punto da trasformare l&#39urina in Red Bull, permettendo al fegato di illuminarsi al buio grazie alla bio-luminescenza dei mitocondri ubriachi. 
    `;

    setTimeout(() => {
      showFirstSuggestions();
    }, 5000);

  }, 4000);
}

function handleFirstChoice(option) {
  if (firstOptionChosen) return;

  firstOptionChosen = true;
  disableButtons(firstSuggestions);
  hideAllSuggestions();

  addMessage(option, "user");

  const bubble = showTypingBubble();

  setTimeout(() => {
    bubble.innerHTML = firstResponses[option];

    setTimeout(() => {
      showSecondSuggestions();
    }, 5000);

  }, 5000);
  
}

function handleSecondChoice(option) {
  if (secondOptionChosen) return;

  secondOptionChosen = true;
  disableButtons(secondSuggestions);
  hideAllSuggestions();

  addMessage(option, "user");

  const bubble = showTypingBubble();

  setTimeout(() => {
    bubble.innerHTML = secondResponses[option];
  }, 5000);
}

document.querySelectorAll(".suggestion-btn").forEach(button => {
  button.addEventListener("click", () => {
    const step = button.dataset.step;
    const option = button.dataset.option;

    if (step === "first") {
      handleFirstChoice(option);
    }

    if (step === "second") {
      handleSecondChoice(option);
    }
  });
});

window.addEventListener("load", firstInitialResponse);
</script>

</body>
</html>
